<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SmartLub | Add Job</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<main class="page-section">
    <div class="container narrow-container">
        <h1 class="page-title mb-4">Add Job</h1>
        <form class="form-panel" th:action="@{/jobs/save}" th:object="${jobDto}" method="post">
            <div th:replace="~{job-form :: formFields}"></div>
            <div class="d-flex gap-2 mt-4">
                <button class="btn btn-primary" type="submit">
                    <i class="bi bi-save"></i>
                    Save Job
                </button>
                <a class="btn btn-outline-secondary" th:href="@{/jobs}">Cancel</a>
            </div>
        </form>
    </div>
</main>
<div th:replace="~{fragments :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
