<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SmartLub | Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<main class="page-section">
    <div class="container narrow-container">
        <div class="section-panel">
            <span class="badge text-bg-primary mb-3">Contact</span>
            <h1 class="page-title">Get In Touch</h1>
            <p class="lead text-muted">This page is ready to connect with a real contact form, email service or support workflow.</p>
            <div class="row g-3 mt-3">
                <div class="col-md-4">
                    <div class="contact-box">
                        <i class="bi bi-envelope"></i>
                        <strong>Email</strong>
                        <span>support@smartlub.dev</span>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="contact-box">
                        <i class="bi bi-telephone"></i>
                        <strong>Phone</strong>
                        <span>+91 98XXXXXXXX</span>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="contact-box">
                        <i class="bi bi-geo-alt"></i>
                        <strong>Location</strong>
                        <span>Hyderabad, India</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{fragments :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
