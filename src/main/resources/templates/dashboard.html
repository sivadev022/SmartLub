<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SmartLub | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>

<main class="page-section">
    <div class="container">
        <div th:replace="~{fragments :: alerts}"></div>
        <div class="d-flex flex-column flex-md-row justify-content-between gap-3 mb-4">
            <div>
                <h1 class="page-title">Dashboard</h1>
                <p class="text-muted mb-0">Quick overview of hiring activity.</p>
            </div>
            <a th:href="@{/jobs/add}" class="btn btn-primary align-self-start">
                <i class="bi bi-plus-lg"></i>
                Add Job
            </a>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="stat-card">
                    <i class="bi bi-folder2-open"></i>
                    <h2 th:text="${totalJobs}">0</h2>
                    <p>Total Jobs</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <i class="bi bi-check-circle"></i>
                    <h2 th:text="${activeJobs}">0</h2>
                    <p>Active Jobs</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <i class="bi bi-buildings"></i>
                    <h2 th:text="${companies}">0</h2>
                    <p>Companies</p>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-8">
                <div class="section-panel">
                    <h2 class="section-title">Recent Jobs</h2>
                    <div th:if="${#lists.isEmpty(recentJobs)}" class="empty-state">
                        <i class="bi bi-inbox"></i>
                        <h3>No jobs yet</h3>
                        <p>Add your first job to see activity here.</p>
                    </div>
                    <div class="row g-3" th:if="${!#lists.isEmpty(recentJobs)}">
                        <div class="col-md-6" th:each="job : ${recentJobs}">
                            <a class="job-mini-card" th:href="@{/jobs/{id}(id=${job.id})}">
                                <span class="badge text-bg-light" th:text="${job.jobType}">FULL_TIME</span>
                                <h3 th:text="${job.title}">Java Developer</h3>
                                <p th:text="${job.company}">Company</p>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="section-panel">
                    <h2 class="section-title">Job Types</h2>
                    <div class="d-flex flex-wrap gap-2">
                        <span class="badge rounded-pill text-bg-primary p-2" th:each="type : ${jobTypes}" th:text="${type}">TYPE</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
