<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SmartLub | Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>

<main>
    <section class="hero-section text-white">
        <div class="container py-5">
            <div class="row align-items-center min-vh-75">
                <div class="col-lg-7">
                    <span class="badge text-bg-warning mb-3">Fresher friendly job portal</span>
                    <h1 class="display-4 fw-bold">SmartLub</h1>
                    <p class="lead mb-4">Manage jobs, internships and hiring details with a clean Spring Boot dashboard made for real CRUD workflows.</p>
                    <div class="d-flex flex-wrap gap-2">
                        <a th:href="@{/jobs}" class="btn btn-warning btn-lg">
                            <i class="bi bi-briefcase"></i>
                            View Jobs
                        </a>
                        <a th:href="@{/dashboard}" class="btn btn-outline-light btn-lg">
                            <i class="bi bi-speedometer2"></i>
                            Dashboard
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="py-5">
        <div class="container">
            <div class="row g-4">
                <div class="col-md-4">
                    <div class="stat-card">
                        <i class="bi bi-briefcase"></i>
                        <h2 th:text="${jobCount}">0</h2>
                        <p>Total Jobs</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card">
                        <i class="bi bi-check2-circle"></i>
                        <h2 th:text="${activeJobs}">0</h2>
                        <p>Active Jobs</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card">
                        <i class="bi bi-buildings"></i>
                        <h2 th:text="${companyCount}">0</h2>
                        <p>Companies</p>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

<div th:replace="~{fragments :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
