<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${job.title} + ' | SmartLub'">Job Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>

<main class="page-section">
    <div class="container">
        <div th:replace="~{fragments :: alerts}"></div>
        <div class="details-header mb-4">
            <div>
                <span class="badge text-bg-warning mb-2" th:text="${job.jobType}">FULL_TIME</span>
                <h1 th:text="${job.title}">Java Developer</h1>
                <p><i class="bi bi-building"></i> <span th:text="${job.company}">Company</span></p>
            </div>
            <div class="d-flex flex-wrap gap-2">
                <a class="btn btn-outline-primary" th:href="@{/jobs/{id}/edit(id=${job.id})}">
                    <i class="bi bi-pencil"></i>
                    Edit
                </a>
                <form th:action="@{/jobs/{id}/delete(id=${job.id})}" method="post" data-confirm="Delete this job?">
                    <button type="submit" class="btn btn-outline-danger">
                        <i class="bi bi-trash"></i>
                        Delete
                    </button>
                </form>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-8">
                <div class="section-panel">
                    <h2 class="section-title">Description</h2>
                    <p class="details-description" th:text="${job.description}">Job description</p>
                    <h2 class="section-title mt-4">Required Skills</h2>
                    <div class="d-flex flex-wrap gap-2">
                        <span class="skill-pill" th:each="skill : ${job.skills}" th:text="${skill}">Java</span>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="section-panel">
                    <h2 class="section-title">Job Summary</h2>
                    <div class="summary-row">
                        <span>Location</span>
                        <strong th:text="${job.location}">Hyderabad</strong>
                    </div>
                    <div class="summary-row">
                        <span>Salary</span>
                        <strong><i class="bi bi-currency-rupee"></i><span th:text="${#numbers.formatDecimal(job.salary, 0, 'COMMA', 0, 'POINT')}">50000</span></strong>
                    </div>
                    <div class="summary-row">
                        <span>Experience</span>
                        <strong><span th:text="${job.experience}">0</span> years</strong>
                    </div>
                    <div class="summary-row">
                        <span>Posted</span>
                        <strong th:text="${#temporals.format(job.postedDate, 'dd MMM yyyy')}">01 Jan 2026</strong>
                    </div>
                    <div class="summary-row">
                        <span>Status</span>
                        <strong th:text="${job.active ? 'Active' : 'Inactive'}">Active</strong>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
