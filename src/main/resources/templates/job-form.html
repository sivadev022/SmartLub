<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="formFields">
    <div class="row g-3">
        <div class="col-md-6">
            <label class="form-label" for="title">Title</label>
            <input id="title" type="text" th:field="*{title}" class="form-control" th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'">
            <div class="invalid-feedback" th:errors="*{title}"></div>
        </div>
        <div class="col-md-6">
            <label class="form-label" for="company">Company</label>
            <input id="company" type="text" th:field="*{company}" class="form-control" th:classappend="${#fields.hasErrors('company')} ? 'is-invalid'">
            <div class="invalid-feedback" th:errors="*{company}"></div>
        </div>
        <div class="col-md-6">
            <label class="form-label" for="location">Location</label>
            <input id="location" type="text" th:field="*{location}" class="form-control" th:classappend="${#fields.hasErrors('location')} ? 'is-invalid'">
            <div class="invalid-feedback" th:errors="*{location}"></div>
        </div>
        <div class="col-md-6">
            <label class="form-label" for="jobType">Job Type</label>
            <select id="jobType" th:field="*{jobType}" class="form-select" th:classappend="${#fields.hasErrors('jobType')} ? 'is-invalid'">
                <option value="">Select type</option>
                <option th:each="type : ${jobTypes}" th:value="${type}" th:text="${type}"></option>
            </select>
            <div class="invalid-feedback" th:errors="*{jobType}"></div>
        </div>
        <div class="col-md-6">
            <label class="form-label" for="salary">Salary</label>
            <input id="salary" type="number" step="0.01" min="0" th:field="*{salary}" class="form-control" th:classappend="${#fields.hasErrors('salary')} ? 'is-invalid'">
            <div class="invalid-feedback" th:errors="*{salary}"></div>
        </div>
        <div class="col-md-6">
            <label class="form-label" for="experience">Experience</label>
            <input id="experience" type="number" min="0" th:field="*{experience}" class="form-control" th:classappend="${#fields.hasErrors('experience')} ? 'is-invalid'">
            <div class="invalid-feedback" th:errors="*{experience}"></div>
        </div>
        <div class="col-12">
            <label class="form-label" for="skillsText">Skills</label>
            <input id="skillsText" type="text" th:field="*{skillsText}" class="form-control" placeholder="Java, Spring Boot, PostgreSQL" th:classappend="${#fields.hasErrors('skillsText')} ? 'is-invalid'">
            <div class="invalid-feedback" th:errors="*{skillsText}"></div>
        </div>
        <div class="col-12">
            <label class="form-label" for="description">Description</label>
            <textarea id="description" rows="6" th:field="*{description}" class="form-control" th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"></textarea>
            <div class="invalid-feedback" th:errors="*{description}"></div>
        </div>
        <div class="col-12">
            <div class="form-check form-switch">
                <input id="active" class="form-check-input" type="checkbox" th:field="*{active}">
                <label class="form-check-label" for="active">Active</label>
            </div>
        </div>
    </div>
</div>
</body>
</html>
