<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SmartLub | Jobs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>

<main class="page-section">
    <div class="container">
        <div th:replace="~{fragments :: alerts}"></div>
        <div class="d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-3 mb-4">
            <div>
                <h1 class="page-title">Jobs</h1>
                <p class="text-muted mb-0">Search, filter, sort and manage all job posts.</p>
            </div>
            <a th:href="@{/jobs/add}" class="btn btn-primary">
                <i class="bi bi-plus-lg"></i>
                Add Job
            </a>
        </div>

        <form class="filter-panel mb-4" th:action="@{/jobs}" method="get">
            <div class="row g-3">
                <div class="col-lg-4">
                    <label class="form-label" for="keyword">Search</label>
                    <input id="keyword" type="text" name="keyword" class="form-control" placeholder="Title, company, location or skill" th:value="${keyword}">
                </div>
                <div class="col-md-4 col-lg-2">
                    <label class="form-label" for="jobType">Job Type</label>
                    <select id="jobType" name="jobType" class="form-select">
                        <option value="">All Types</option>
                        <option th:each="type : ${jobTypes}" th:value="${type}" th:text="${type}" th:selected="${type == selectedJobType}"></option>
                    </select>
                </div>
                <div class="col-md-4 col-lg-2">
                    <label class="form-label" for="experience">Experience</label>
                    <input id="experience" type="number" min="0" name="experience" class="form-control" placeholder="Min years" th:value="${experience}">
                </div>
                <div class="col-md-4 col-lg-2">
                    <label class="form-label" for="sortBy">Sort By</label>
                    <select id="sortBy" name="sortBy" class="form-select">
                        <option value="postedDate" th:selected="${sortBy == 'postedDate'}">Posted Date</option>
                        <option value="salary" th:selected="${sortBy == 'salary'}">Salary</option>
                        <option value="experience" th:selected="${sortBy == 'experience'}">Experience</option>
                        <option value="title" th:selected="${sortBy == 'title'}">Title</option>
                    </select>
                </div>
                <div class="col-md-4 col-lg-2">
                    <label class="form-label" for="direction">Order</label>
                    <select id="direction" name="direction" class="form-select">
                        <option value="desc" th:selected="${direction == 'desc'}">Descending</option>
                        <option value="asc" th:selected="${direction == 'asc'}">Ascending</option>
                    </select>
                </div>
            </div>
            <div class="d-flex flex-wrap gap-2 mt-3">
                <button class="btn btn-primary" type="submit">
                    <i class="bi bi-search"></i>
                    Apply
                </button>
                <a class="btn btn-outline-secondary" th:href="@{/jobs}">
                    <i class="bi bi-arrow-counterclockwise"></i>
                    Reset
                </a>
            </div>
        </form>

        <div th:if="${jobs.totalElements == 0}" class="empty-state">
            <i class="bi bi-search"></i>
            <h2>No data found</h2>
            <p>No jobs matched your current search or filter.</p>
        </div>

        <div class="row g-4" th:if="${jobs.totalElements > 0}">
            <div class="col-md-6 col-xl-4" th:each="job : ${jobs.content}">
                <div class="job-card h-100">
                    <div class="d-flex justify-content-between gap-3 mb-3">
                        <span class="badge text-bg-primary" th:text="${job.jobType}">FULL_TIME</span>
                        <span class="small text-muted" th:text="${#temporals.format(job.postedDate, 'dd MMM yyyy')}">01 Jan 2026</span>
                    </div>
                    <h2 th:text="${job.title}">Java Developer</h2>
                    <p class="company"><i class="bi bi-building"></i> <span th:text="${job.company}">Company</span></p>
                    <p class="location"><i class="bi bi-geo-alt"></i> <span th:text="${job.location}">Location</span></p>
                    <div class="d-flex flex-wrap gap-2 my-3">
                        <span class="skill-pill" th:each="skill : ${job.skills}" th:text="${skill}">Java</span>
                    </div>
                    <div class="job-meta">
                        <span><i class="bi bi-currency-rupee"></i><span th:text="${#numbers.formatDecimal(job.salary, 0, 'COMMA', 0, 'POINT')}">50000</span></span>
                        <span><i class="bi bi-person-workspace"></i><span th:text="${job.experience}">0</span> yrs</span>
                    </div>
                    <div class="d-flex gap-2 mt-4">
                        <a class="btn btn-outline-primary flex-fill" th:href="@{/jobs/{id}(id=${job.id})}">
                            <i class="bi bi-eye"></i>
                            Details
                        </a>
                        <a class="btn btn-outline-secondary" th:href="@{/jobs/{id}/edit(id=${job.id})}">
                            <i class="bi bi-pencil"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <nav th:if="${jobs.totalPages > 1}" class="mt-4">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${jobs.first} ? 'disabled'">
                    <a class="page-link" th:href="@{/jobs(page=${jobs.number - 1}, keyword=${keyword}, jobType=${selectedJobType}, experience=${experience}, sortBy=${sortBy}, direction=${direction})}">Previous</a>
                </li>
                <li class="page-item" th:each="pageNumber : ${#numbers.sequence(0, jobs.totalPages - 1)}" th:classappend="${pageNumber == jobs.number} ? 'active'">
                    <a class="page-link" th:href="@{/jobs(page=${pageNumber}, keyword=${keyword}, jobType=${selectedJobType}, experience=${experience}, sortBy=${sortBy}, direction=${direction})}" th:text="${pageNumber + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${jobs.last} ? 'disabled'">
                    <a class="page-link" th:href="@{/jobs(page=${jobs.number + 1}, keyword=${keyword}, jobType=${selectedJobType}, experience=${experience}, sortBy=${sortBy}, direction=${direction})}">Next</a>
                </li>
            </ul>
        </nav>
    </div>
</main>

<div th:replace="~{fragments :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
